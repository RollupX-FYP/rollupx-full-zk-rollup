[batch]
max_batch_size     = ${MAX_BATCH_SIZE}
timeout_interval_ms = ${TIMEOUT_MS}
min_batch_size     = ${MIN_BATCH_SIZE}
max_gas_limit      = 30000000
batch_policy       = "${BATCH_POLICY}"
adaptive_low_load_threshold = ${ADAPTIVE_LOW_LOAD_THRESHOLD}
adaptive_medium_load_threshold = ${ADAPTIVE_MEDIUM_LOAD_THRESHOLD}
adaptive_small_batch_size = ${ADAPTIVE_SMALL_BATCH_SIZE}
adaptive_medium_batch_size = ${ADAPTIVE_MEDIUM_BATCH_SIZE}
adaptive_large_batch_size = ${ADAPTIVE_LARGE_BATCH_SIZE}
blob_target_bytes = ${BLOB_TARGET_BYTES}
blob_fill_target = ${BLOB_FILL_TARGET}

[scheduling]
policy_type   = "${POLICY}"
time_window_ms = 5000

[api]
host = "${SEQ_HOST:-127.0.0.1}"
port = ${SEQ_PORT:-3000}

[l1]
rpc_url        = "${L1_RPC_URL}"
bridge_address = "${BRIDGE_ADDRESS}"
start_block    = ${START_BLOCK:-0}

[database]
url = "sqlite://sequencer_${RUN_ID}.db"

[prover]
backend = "${PROVER}"

[da]
mode = "${DA_MODE}"

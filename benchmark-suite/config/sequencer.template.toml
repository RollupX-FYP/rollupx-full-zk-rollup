[batch]
max_batch_size     = ${MAX_BATCH_SIZE}
timeout_interval_ms = ${TIMEOUT_MS}
min_batch_size     = 5
max_gas_limit      = 30000000

[scheduling]
policy_type   = "${POLICY}"
time_window_ms = 5000

[api]
host = "${SEQ_HOST:-127.0.0.1}"
port = ${SEQ_PORT:-3000}

[l1]
rpc_url        = "${L1_RPC_URL}"
bridge_address = "${BRIDGE_ADDRESS}"
start_block    = ${START_BLOCK:-0}

[database]
url = "sqlite://sequencer_${RUN_ID}.db"

[prover]
backend = "${PROVER}"

[da]
mode = "${DA_MODE}"

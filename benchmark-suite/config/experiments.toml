[baseline]
batch_size = 50
timeout_ms = 30000
min_batch_size = 1
policy = "FCFS"
da_mode = "calldata"
prover = "groth16"
rate_tps = 10
duration_s = 120
warmup_s = 15
tx_mix = "balanced"
repeats = 5
seeds = [42, 43, 44, 45, 46]

# Batch-size sweep for feasibility modeling
[[experiments]]
factor = "batch_size"
id = "bs_001"
batch_size = 1

[[experiments]]
factor = "batch_size"
id = "bs_010"
batch_size = 10

[[experiments]]
factor = "batch_size"
id = "bs_025"
batch_size = 25

[[experiments]]
factor = "batch_size"
id = "bs_050"
batch_size = 50

[[experiments]]
factor = "batch_size"
id = "bs_100"
batch_size = 100

[[experiments]]
factor = "batch_size"
id = "bs_250"
batch_size = 250

[[experiments]]
factor = "batch_size"
id = "bs_500"
batch_size = 500

[[experiments]]
factor = "batch_size"
id = "bs_1000"
batch_size = 1000

# DA mode comparison (repeat selected sizes with matrix tooling by filter)
[[experiments]]
factor = "da_mode"
id = "da_blob"
da_mode = "blob"

[[experiments]]
factor = "da_mode"
id = "da_offchain"
da_mode = "offchain"

# Workload classes
[[experiments]]
factor = "tx_mix"
id = "mix_light"
tx_mix = "light"

[[experiments]]
factor = "tx_mix"
id = "mix_heavy"
tx_mix = "heavy"

# Optional stress traffic for high batch caps
[[experiments]]
factor = "rate"
id = "tps_020"
rate_tps = 20

[[experiments]]
factor = "rate"
id = "tps_050"
rate_tps = 50

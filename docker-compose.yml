services:
  l1-node:
    build:
      context: ./contracts
      dockerfile: Dockerfile.node
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8545"]
      interval: 2s
      timeout: 5s
      retries: 10

  setup:
    build:
      context: ./contracts
      dockerfile: Dockerfile
    command: ["npx", "hardhat", "run", "scripts/deploy-local.ts", "--network", "host_docker"]
    depends_on:
      l1-node:
        condition: service_healthy
    environment:
      - SEPOLIA_RPC_URL=http://l1-node:8545

  sequencer:
    build:
      context: .
      dockerfile: sequencer/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - SEQUENCER_CONFIG=/app/sequencer.yaml
    volumes:
      - ./sequencer/sequencer.docker.yaml:/app/sequencer.yaml
    depends_on:
      l1-node:
        condition: service_healthy

  executor:
    build:
      context: .
      dockerfile: executor/Dockerfile
    ports:
      - "50051:50051"
    environment:
      - EXECUTOR_CONFIG=/app/executor.yaml
    volumes:
      - ./executor/executor.docker.yaml:/app/executor.yaml
    depends_on:
      - sequencer

  submitter:
    build:
      context: .
      dockerfile: submitter/Dockerfile
    environment:
      - SUBMITTER_CONFIG=/app/submitter.yaml
      - SUBMITTER_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
    volumes:
      - ./submitter/submitter.docker.yaml:/app/submitter.yaml
    depends_on:
      executor:
        condition: service_started
      l1-node:
        condition: service_healthy
      setup:
        condition: service_completed_successfully

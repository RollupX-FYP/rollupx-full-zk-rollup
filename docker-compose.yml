services:
  hardhat:
    profiles: ["core"]
    image: ${CONTRACTS_IMAGE:-rollupx/contracts:dev}
    build:
      context: ./contracts
      dockerfile: Dockerfile
    command:
      ["npx", "hardhat", "node", "--hostname", "0.0.0.0", "--port", "8545"]
    environment:
      - HARDHAT_MINING_INTERVAL=${HARDHAT_MINING_INTERVAL:-12000}
    ports:
      - "${HARDHAT_HOST_PORT:-8545}:8545"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:8545'',{method:''POST'',headers:{''content-type'':''application/json''},body:JSON.stringify({jsonrpc:''2.0'',method:''eth_blockNumber'',params:[],id:1})}).then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"',
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      rollupx:
        aliases:
          - l1-node

  contracts-deployer:
    profiles: ["core"]
    image: ${CONTRACTS_IMAGE:-rollupx/contracts:dev}
    depends_on:
      hardhat:
        condition: service_healthy
    command: ["sh", "/compose/scripts/deploy-runtime.sh"]
    environment:
      RUNTIME_DIR: /runtime
      L1_RPC_HTTP: ${L1_RPC_HTTP:-http://hardhat:8545}
      L1_RPC_WS: ${L1_RPC_WS:-ws://hardhat:8545}
      L1_CHAIN_ID: ${L1_CHAIN_ID:-31337}
      L1_START_BLOCK: ${L1_START_BLOCK:-0}
      SEQUENCER_BATCH_MAX_SIZE: ${SEQUENCER_BATCH_MAX_SIZE:-100}
      SEQUENCER_BATCH_TIMEOUT_MS: ${SEQUENCER_BATCH_TIMEOUT_MS:-5000}
      SEQUENCER_BATCH_MIN_SIZE: ${SEQUENCER_BATCH_MIN_SIZE:-10}
      SEQUENCER_BATCH_MAX_GAS_LIMIT: ${SEQUENCER_BATCH_MAX_GAS_LIMIT:-30000000}
      SEQUENCER_BATCH_POLICY: ${SEQUENCER_BATCH_POLICY:-fixed}
      SEQUENCER_ADAPTIVE_LOW_LOAD_THRESHOLD: ${SEQUENCER_ADAPTIVE_LOW_LOAD_THRESHOLD:-50}
      SEQUENCER_ADAPTIVE_MEDIUM_LOAD_THRESHOLD: ${SEQUENCER_ADAPTIVE_MEDIUM_LOAD_THRESHOLD:-200}
      SEQUENCER_ADAPTIVE_SMALL_BATCH_SIZE: ${SEQUENCER_ADAPTIVE_SMALL_BATCH_SIZE:-50}
      SEQUENCER_ADAPTIVE_MEDIUM_BATCH_SIZE: ${SEQUENCER_ADAPTIVE_MEDIUM_BATCH_SIZE:-100}
      SEQUENCER_ADAPTIVE_LARGE_BATCH_SIZE: ${SEQUENCER_ADAPTIVE_LARGE_BATCH_SIZE:-500}
      SEQUENCER_BLOB_TARGET_BYTES: ${SEQUENCER_BLOB_TARGET_BYTES:-131072}
      SEQUENCER_BLOB_FILL_TARGET: ${SEQUENCER_BLOB_FILL_TARGET:-0.90}
      SEQUENCER_POLICY: ${SEQUENCER_POLICY:-FCFS}
      SUBMITTER_DA_MODE: ${SUBMITTER_DA_MODE:-offchain}
      SUBMITTER_BLOB_BINDING: ${SUBMITTER_BLOB_BINDING:-mock}
      SUBMITTER_BLOB_INDEX: ${SUBMITTER_BLOB_INDEX:-0}
      SUBMITTER_ARCHIVER_URL: ${SUBMITTER_ARCHIVER_URL:-}
      SUBMITTER_PROOF_BACKEND: ${SUBMITTER_PROOF_BACKEND:-groth16}
      SUBMITTER_PROOF_VERIFICATION_MODE: ${SUBMITTER_PROOF_VERIFICATION_MODE:-onchain}
      SUBMITTER_PROOF_VERIFIER_ID: ${SUBMITTER_PROOF_VERIFIER_ID:-0}
    volumes:
      - runtime_config:/runtime
      - ./compose/scripts:/compose/scripts:ro
    restart: "no"
    networks:
      - rollupx

  executor:
    profiles: ["core"]
    image: ${EXECUTOR_IMAGE:-rollupx/executor:dev}
    build:
      context: .
      dockerfile: executor/Dockerfile
    depends_on:
      contracts-deployer:
        condition: service_completed_successfully
    environment:
      EXECUTOR_GRPC_ADDR: 0.0.0.0:50051
      TRACE_ROOT: /var/lib/rollupx/executor/traces
      STATE_DB_PATH: /var/lib/rollupx/executor/state_db
      RISC0_WORK_DIR: ${RISC0_HOST_WORK_DIR:-/tmp/rollupx-risc0}
      RISC0_HOST_BIN: /usr/local/bin/rollup_host
      PROVER_BACKEND: risc0
      RISC0_DEV_MODE: ${RISC0_DEV_MODE:-0}
      ALLOW_PROOF_FALLBACK: ${ALLOW_PROOF_FALLBACK:-1}
      REQUIRE_REAL_PROOFS: ${REQUIRE_REAL_PROOFS:-true}
      METRICS_ROOT: /var/lib/rollupx/metrics
      EXPERIMENT_ID: ${EXPERIMENT_ID:-compose_core}
      EXPERIMENT_NAME: ${EXPERIMENT_NAME:-compose core}
    volumes:
      - executor_state:/var/lib/rollupx/executor/state_db
      - executor_traces:/var/lib/rollupx/executor/traces
      - ${RISC0_HOST_WORK_DIR:-/tmp/rollupx-risc0}:${RISC0_HOST_WORK_DIR:-/tmp/rollupx-risc0}
      - ${METRICS_DIR:-./benchmark-suite/metrics/latest}:/var/lib/rollupx/metrics
      - runtime_config:/runtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${EXECUTOR_HOST_PORT:-50051}:50051"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f zksync_state_machine >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 15s
    networks:
      - rollupx

  submitter:
    profiles: ["core"]
    image: ${SUBMITTER_IMAGE:-rollupx/submitter:dev}
    build:
      context: .
      dockerfile: submitter/Dockerfile
    depends_on:
      contracts-deployer:
        condition: service_completed_successfully
      executor:
        condition: service_healthy
    command: ["--config", "/runtime/submitter.yaml"]
    environment:
      SUBMITTER_PRIVATE_KEY: ${SUBMITTER_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      COMM_MODE: grpc
      EXECUTOR_URL: http://executor:50051
      OUTBOX_DB_PATH: /var/lib/rollupx/submitter/outbox.db
      METRICS_ROOT: /var/lib/rollupx/metrics
      EXPERIMENT_ID: ${EXPERIMENT_ID:-compose_core}
      EXPERIMENT_NAME: ${EXPERIMENT_NAME:-compose core}
      ETH_PRICE_USD: ${ETH_PRICE_USD:-2500}
      REGULAR_GAS_PRICE_GWEI: ${REGULAR_GAS_PRICE_GWEI:-2}
      BLOB_GAS_PRICE_GWEI: ${BLOB_GAS_PRICE_GWEI:-0.001}
    volumes:
      - submitter_data:/var/lib/rollupx/submitter
      - ${METRICS_DIR:-./benchmark-suite/metrics/latest}:/var/lib/rollupx/metrics
      - runtime_config:/runtime:ro
    ports:
      - "${SUBMITTER_METRICS_HOST_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f submitter >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 15s
    networks:
      - rollupx

  sequencer:
    profiles: ["core"]
    image: ${SEQUENCER_IMAGE:-rollupx/sequencer:dev}
    build:
      context: .
      dockerfile: sequencer/Dockerfile
    depends_on:
      contracts-deployer:
        condition: service_completed_successfully
      executor:
        condition: service_healthy
      submitter:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - cp /runtime/sequencer.default.toml /app/config/default.toml && exec /usr/local/bin/sequencer
    environment:
      METRICS_ROOT: /var/lib/rollupx/metrics
      EXPERIMENT_ID: ${EXPERIMENT_ID:-compose_core}
      EXPERIMENT_NAME: ${EXPERIMENT_NAME:-compose core}
      SEQUENCER_EXECUTOR_PUBLISH_RETRIES: ${SEQUENCER_EXECUTOR_PUBLISH_RETRIES:-5}
      SEQUENCER_EXECUTOR_PUBLISH_TIMEOUT_MS: ${SEQUENCER_EXECUTOR_PUBLISH_TIMEOUT_MS:-10000}
      SEQUENCER_DEV_SEED_ADDRS: ${SEQUENCER_DEV_SEED_ADDRS:-}
    volumes:
      - ${METRICS_DIR:-./benchmark-suite/metrics/latest}:/var/lib/rollupx/metrics
      - sequencer_db:/var/lib/rollupx/sequencer
      - runtime_config:/runtime:ro
    ports:
      - "${SEQUENCER_HOST_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:3000/health >/dev/null",
        ]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 20s
    networks:
      - rollupx

  benchmark:
    profiles: ["bench"]
    image: ${BENCHMARK_IMAGE:-rollupx/benchmark:dev}
    build:
      context: ./benchmark-suite
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      SEQ_HOST: sequencer
      SEQ_PORT: 3000
      METRICS_ROOT: /var/lib/rollupx/metrics
      L1_RPC_URL: ${L1_RPC_HTTP:-http://hardhat:8545}
    command: ["bash", "-lc", "sleep infinity"]
    volumes:
      - ${METRICS_DIR:-./benchmark-suite/metrics/latest}:/var/lib/rollupx/metrics
      - runtime_config:/runtime:ro
    networks:
      - rollupx

  data-tools:
    profiles: ["report"]
    image: ${DATA_TOOLS_IMAGE:-rollupx/data-tools:dev}
    build:
      context: .
      dockerfile: data-tools/Dockerfile
    environment:
      METRICS_ROOT: /var/lib/rollupx/metrics
    volumes:
      - ${METRICS_DIR:-./benchmark-suite/metrics/latest}:/var/lib/rollupx/metrics
    networks:
      - rollupx

volumes:
  sequencer_db:
  executor_state:
  executor_traces:
  submitter_data:
  runtime_config:

networks:
  rollupx:
    driver: bridge
